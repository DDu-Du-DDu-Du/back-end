name: 배포 파이프라인

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      ecr_repository_name:
        required: true
        type: string
      ecr_repository_tag_name:
        required: true
        type: string
      deployment_enabled:
        required: false
        default: true
        type: boolean
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SUBMODULES_SECRET:
        required: true
      TF_VAR_DB_PASSWORD:
        required: true
      TF_VAR_RDS_DB_NAME:
        required: true
      TF_VAR_RDS_USERNAME:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_SECRET }}
          submodules: true

      - name: JDK 17 설치
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "corretto"

      - name: Gradle 셋업
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: "${{ github.event.repository != null && github.base_ref != github.event.repository.default_branch }}"

      - name: 빌드 권한 부여
        run: chmod +x gradlew

      - name: 프로젝트 빌드
        run: ./gradlew build --parallel -x test

      - name: AWS Credentials 설정
        uses: aws-actions/configure-aws-credentials@v6
        if: ${{ inputs.deployment_enabled }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2
        if: ${{ inputs.deployment_enabled }}

      - name: Docker 이미지 빌드 및 ECR Push
        id: build_docker
        if: ${{ inputs.deployment_enabled }}
        env:
          REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr_repository_name }}
          IMAGE_TAG: ${{ github.sha }}
          PROFILE: ${{ inputs.env }}
        run: |
          docker build . \
            --platform linux/arm64 \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            --build-arg PROFILE=$PROFILE
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v4
        if: ${{ inputs.deployment_enabled }}

      - name: Terraform Init (Remote Backend)
        if: ${{ inputs.deployment_enabled }}
        working-directory: terraform/${{ inputs.env }}
        run: |
          terraform init \
            -reconfigure \
            -input=false

      - name: Terraform Format Check
        if: ${{ inputs.deployment_enabled }}
        working-directory: terraform/${{ inputs.env }}
        run: |
          terraform fmt \
            -check \
            -recursive

      - name: Terraform Validate
        if: ${{ inputs.deployment_enabled }}
        working-directory: terraform/${{ inputs.env }}
        run: terraform validate

      - name: Terraform Plan (ECS Deploy Target)
        if: ${{ inputs.deployment_enabled }}
        working-directory: terraform/${{ inputs.env }}
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_rds_db_name: ${{ secrets.TF_VAR_RDS_DB_NAME }}
          TF_VAR_rds_username: ${{ secrets.TF_VAR_RDS_USERNAME }}
          TF_VAR_ecr_repository_name: ${{ inputs.ecr_repository_name }}
          TF_VAR_ecr_repository_tag_name: ${{ inputs.ecr_repository_tag_name }}
          TF_VAR_ecs_image_tag: ${{ steps.build_docker.outputs.image_tag }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -target=module.ecs.aws_ecs_task_definition.modoo_task \
            -target=module.ecs.aws_ecs_service.modoo_ecs_service

      - name: Terraform Apply (ECS Deploy Target)
        if: ${{ inputs.deployment_enabled }}
        working-directory: terraform/${{ inputs.env }}
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_rds_db_name: ${{ secrets.TF_VAR_RDS_DB_NAME }}
          TF_VAR_rds_username: ${{ secrets.TF_VAR_RDS_USERNAME }}
          TF_VAR_ecs_image_tag: ${{ steps.build_docker.outputs.image_tag }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan
